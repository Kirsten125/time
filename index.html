<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>時差轉換器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.7.2/luxon.min.js"></script>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: rgba(255, 255, 255, 0.92);
      --line: #e3e9f4;
      --text: #182230;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #eef4ff;
      --accent: #0f766e;
      --warn-bg: #fff7ed;
      --warn-line: #fed7aa;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 26%),
        var(--bg);
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 22px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(227, 233, 244, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input[type="datetime-local"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      outline: none;
    }

    select:focus,
    input[type="datetime-local"]:focus {
      border-color: #bfd2ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .toolbar,
    .adjust-row,
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      margin-top: 14px;
    }

    .section-title {
      margin: 18px 0 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #cbd9ff;
      background: #fbfdff;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    button.ghost {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }

    .adjust-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.88);
    }

    .mini-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .mini-card .adjust-row button {
      flex: 1;
      min-width: 0;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .preset-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.92);
    }

    .preset-card-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .chip {
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 14px;
      line-height: 1;
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.96);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: var(--primary-soft);
      color: var(--primary);
      margin-bottom: 10px;
    }

    .city {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .time {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .date {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .offset-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
    }

    .offset-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .offset-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      white-space: nowrap;
    }

    .warning {
      display: none;
      border: 1px solid var(--warn-line);
      background: var(--warn-bg);
      color: #9a3412;
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.75;
      font-size: 14px;
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .layout,
      .preset-grid,
      .adjust-group,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding: 20px 14px 30px;
      }

      .card {
        padding: 16px;
        border-radius: 20px;
      }

      .offset-box {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Time Zone Converter</div>
      <h1>時差轉換，簡單又好看</h1>
      <p class="sub">像常見時差網站一樣直覺，但介面更乾淨。支援日期、時、分調整，並自動處理冬令時間和夏令時間。</p>
    </section>

    <section class="layout">
      <div class="card">
        <h2>轉換設定</h2>

        <div class="form-grid">
          <div class="field">
            <label for="sourceZone">原始時區</label>
            <select id="sourceZone"></select>
          </div>

          <div class="field">
            <label for="targetZone">目標時區</label>
            <select id="targetZone"></select>
          </div>

          <div class="field full">
            <label for="sourceDateTime">原始日期時間</label>
            <input id="sourceDateTime" type="datetime-local" />
          </div>
        </div>

        <div class="toolbar">
          <button id="nowBtn" class="primary" type="button">現在時間</button>
          <button id="swapBtn" class="ghost" type="button">交換時區</button>
        </div>

        <div class="section-title">調整時間</div>
        <div class="adjust-group">
          <div class="mini-card">
            <h3>日</h3>
            <div class="adjust-row">
              <button type="button" data-days="-1">-1</button>
              <button type="button" data-days="1">+1</button>
            </div>
          </div>

          <div class="mini-card">
            <h3>時</h3>
            <div class="adjust-row">
              <button type="button" data-hours="-1">-1</button>
              <button type="button" data-hours="1">+1</button>
            </div>
          </div>

          <div class="mini-card">
            <h3>分</h3>
            <div class="adjust-row">
              <button type="button" data-minutes="-30">-30</button>
              <button type="button" data-minutes="30">+30</button>
            </div>
          </div>
        </div>

        <div class="section-title">常用快捷城市</div>
        <div class="preset-grid">
          <div class="preset-card">
            <div class="preset-card-title">設為原始</div>
            <div class="preset-row" id="sourcePresetRow"></div>
          </div>
          <div class="preset-card">
            <div class="preset-card-title">設為目標</div>
            <div class="preset-row" id="targetPresetRow"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>轉換結果</h2>
        <div class="results">
          <div class="result-card">
            <div class="pill">原始</div>
            <div id="sourceCity" class="city"></div>
            <div id="sourceTime" class="time"></div>
            <div id="sourceDate" class="date"></div>
          </div>

          <div class="result-card">
            <div class="pill">目標</div>
            <div id="targetCity" class="city"></div>
            <div id="targetTime" class="time"></div>
            <div id="targetDate" class="date"></div>
          </div>

          <div class="offset-box">
            <div class="offset-text">依照目前選定的日期與時間，自動計算兩地實際時差。遇到 DST 切換時，差值也會跟著變化。</div>
            <div id="offsetValue" class="offset-value">+0h</div>
          </div>

          <div id="warningBox" class="warning"></div>
        </div>

        <div class="footer-note">建議使用 IANA 時區名稱處理，例如 Asia/Taipei、Europe/Dublin、America/New_York，這樣才能正確套用冬夏令時間。</div>
      </div>
    </section>
  </div>

  <script>
    const { DateTime } = luxon;

    const zoneOptions = [
      ["Asia/Taipei", "台北 Taipei"],
      ["Asia/Tokyo", "東京 Tokyo"],
      ["Asia/Seoul", "首爾 Seoul"],
      ["Asia/Singapore", "新加坡 Singapore"],
      ["Asia/Hong_Kong", "香港 Hong Kong"],
      ["Europe/Dublin", "都柏林 Dublin"],
      ["Europe/London", "倫敦 London"],
      ["Europe/Paris", "巴黎 Paris"],
      ["Europe/Berlin", "柏林 Berlin"],
      ["America/New_York", "紐約 New York"],
      ["America/Chicago", "芝加哥 Chicago"],
      ["America/Los_Angeles", "洛杉磯 Los Angeles"],
      ["Australia/Sydney", "雪梨 Sydney"],
      ["UTC", "UTC"]
    ];

    const presetZones = [
      ["Asia/Taipei", "台北"],
      ["Europe/Dublin", "都柏林"],
      ["Europe/London", "倫敦"],
      ["America/New_York", "紐約"],
      ["America/Los_Angeles", "洛杉磯"],
      ["Asia/Tokyo", "東京"]
    ];

    const sourceZoneEl = document.getElementById("sourceZone");
    const targetZoneEl = document.getElementById("targetZone");
    const sourceDateTimeEl = document.getElementById("sourceDateTime");
    const nowBtn = document.getElementById("nowBtn");
    const swapBtn = document.getElementById("swapBtn");
    const sourcePresetRow = document.getElementById("sourcePresetRow");
    const targetPresetRow = document.getElementById("targetPresetRow");

    const sourceCity = document.getElementById("sourceCity");
    const sourceTime = document.getElementById("sourceTime");
    const sourceDate = document.getElementById("sourceDate");
    const targetCity = document.getElementById("targetCity");
    const targetTime = document.getElementById("targetTime");
    const targetDate = document.getElementById("targetDate");
    const offsetValue = document.getElementById("offsetValue");
    const warningBox = document.getElementById("warningBox");

    function toInputValue(dt) {
      return dt.toFormat("yyyy-LL-dd'T'HH:mm");
    }

    function formatOffset(minutes) {
      const sign = minutes >= 0 ? "+" : "-";
      const abs = Math.abs(minutes);
      const h = String(Math.floor(abs / 60)).padStart(2, "0");
      const m = String(abs % 60).padStart(2, "0");
      return `UTC${sign}${h}:${m}`;
    }

    function formatDate(dt) {
      return dt.setLocale("zh-TW").toFormat("yyyy/LL/dd ccc");
    }

    function formatTime(dt) {
      return dt.toFormat("HH:mm");
    }

    function getLabel(zone) {
      const found = zoneOptions.find(item => item[0] === zone);
      return found ? found[1] : zone;
    }

    function populateZones() {
      [sourceZoneEl, targetZoneEl].forEach(select => {
        zoneOptions.forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = `${label} (${value})`;
          select.appendChild(option);
        });
      });

      sourceZoneEl.value = "Asia/Taipei";
      targetZoneEl.value = "Europe/Dublin";
    }

    function createPresetButtons() {
      presetZones.forEach(([zone, label]) => {
        const sourceBtn = document.createElement("button");
        sourceBtn.type = "button";
        sourceBtn.className = "chip";
        sourceBtn.textContent = label;
        sourceBtn.addEventListener("click", () => {
          sourceZoneEl.value = zone;
          render(true);
        });
        sourcePresetRow.appendChild(sourceBtn);

        const targetBtn = document.createElement("button");
        targetBtn.type = "button";
        targetBtn.className = "chip";
        targetBtn.textContent = label;
        targetBtn.addEventListener("click", () => {
          targetZoneEl.value = zone;
          render(false);
        });
        targetPresetRow.appendChild(targetBtn);
      });
    }

    function getSourceDateTime() {
      const raw = sourceDateTimeEl.value;
      const zone = sourceZoneEl.value;
      if (!raw) return null;
      return DateTime.fromISO(raw, { zone });
    }

    function setNow() {
      const now = DateTime.now().setZone(sourceZoneEl.value).startOf("minute");
      sourceDateTimeEl.value = toInputValue(now);
      render(false);
    }

    function adjustTime({ days = 0, hours = 0, minutes = 0 }) {
      let dt = getSourceDateTime();
      if (!dt || !dt.isValid) {
        dt = DateTime.now().setZone(sourceZoneEl.value).startOf("minute");
      }
      dt = dt.plus({ days, hours, minutes });
      sourceDateTimeEl.value = toInputValue(dt);
      render(false);
    }

    function updateWarning(sourceDT, rawInput) {
      const messages = [];

      if (!sourceDT || !sourceDT.isValid) {
        messages.push("請輸入有效的日期與時間。");
      }

      if (sourceDT && sourceDT.isValid) {
        const roundTrip = sourceDT.toFormat("yyyy-LL-dd'T'HH:mm");
        if (rawInput && roundTrip !== rawInput) {
          messages.push(`你輸入的時間剛好遇到夏令時間切換，系統已自動校正為 ${roundTrip}。`);
        }

        const possible = sourceDT.getPossibleOffsets ? sourceDT.getPossibleOffsets() : [];
        if (possible.length > 1) {
          messages.push("這個時間可能落在冬令時間切換區段，因此同一個時刻可能有兩種偏移量解讀。");
        }
      }

      if (messages.length) {
        warningBox.style.display = "block";
        warningBox.innerHTML = messages.join("<br><br>");
      } else {
        warningBox.style.display = "none";
        warningBox.innerHTML = "";
      }
    }

    function render(keepClockTime) {
      const rawInput = sourceDateTimeEl.value;
      let sourceDT = getSourceDateTime();

      if ((!sourceDT || !sourceDT.isValid) && !rawInput) {
        sourceDT = DateTime.now().setZone(sourceZoneEl.value).startOf("minute");
        sourceDateTimeEl.value = toInputValue(sourceDT);
      }

      if (!sourceDT || !sourceDT.isValid) {
        sourceCity.textContent = getLabel(sourceZoneEl.value);
        sourceTime.textContent = "--:--";
        sourceDate.textContent = "";
        targetCity.textContent = getLabel(targetZoneEl.value);
        targetTime.textContent = "--:--";
        targetDate.textContent = "";
        offsetValue.textContent = "--";
        updateWarning(sourceDT, rawInput);
        return;
      }

      if (keepClockTime) {
        sourceDT = DateTime.fromObject(
          {
            year: sourceDT.year,
            month: sourceDT.month,
            day: sourceDT.day,
            hour: sourceDT.hour,
            minute: sourceDT.minute
          },
          { zone: sourceZoneEl.value }
        );
        sourceDateTimeEl.value = toInputValue(sourceDT);
      }

      const targetDT = sourceDT.setZone(targetZoneEl.value);
      const diffMinutes = targetDT.offset - sourceDT.offset;
      const hours = diffMinutes / 60;
      const diffText = Number.isInteger(hours) ? `${hours >= 0 ? "+" : ""}${hours}h` : `${hours >= 0 ? "+" : ""}${hours.toFixed(1)}h`;

      sourceCity.textContent = `${getLabel(sourceZoneEl.value)} ・ ${formatOffset(sourceDT.offset)}`;
      sourceTime.textContent = formatTime(sourceDT);
      sourceDate.textContent = formatDate(sourceDT);

      targetCity.textContent = `${getLabel(targetZoneEl.value)} ・ ${formatOffset(targetDT.offset)}`;
      targetTime.textContent = formatTime(targetDT);
      targetDate.textContent = formatDate(targetDT);

      offsetValue.textContent = diffText;
      updateWarning(sourceDT, rawInput);
    }

    function swapZones() {
      const source = sourceZoneEl.value;
      const target = targetZoneEl.value;
      sourceZoneEl.value = target;
      targetZoneEl.value = source;
      render(true);
    }

    document.querySelectorAll("[data-days], [data-hours], [data-minutes]").forEach(btn => {
      btn.addEventListener("click", () => {
        adjustTime({
          days: Number(btn.dataset.days || 0),
          hours: Number(btn.dataset.hours || 0),
          minutes: Number(btn.dataset.minutes || 0)
        });
      });
    });

    sourceZoneEl.addEventListener("change", () => render(true));
    targetZoneEl.addEventListener("change", () => render(false));
    sourceDateTimeEl.addEventListener("input", () => render(false));
    nowBtn.addEventListener("click", setNow);
    swapBtn.addEventListener("click", swapZones);

    populateZones();
    createPresetButtons();
    setNow();
  </script>
</body>
</html>
