<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⏳時區轉換器⌛</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.7.2/luxon.min.js"></script>
  <style>
    :root {
      --bg1: #f4f7ff;
      --bg2: #eefbf8;
      --card: rgba(255, 255, 255, 0.92);
      --card-strong: rgba(255, 255, 255, 0.98);
      --line: #e5ebf5;
      --text: #172033;
      --muted: #667085;
      --primary: #2563eb;
      --primary-soft: #eef4ff;
      --accent: #0f766e;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --warn-bg: #fff7ed;
      --warn-line: #fdba74;
      --warn-text: #9a3412;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(37, 99, 235, 0.10), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(15, 118, 110, 0.08), transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, #f8fbff 42%, var(--bg2) 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .title-box {
      width: 100%;
      text-align: center;
      padding: 26px 20px 18px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .picker-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
    }

    .picker-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input[type="datetime-local"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 15px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--text);
      outline: none;
      transition: 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    select:focus,
    input[type="datetime-local"]:focus {
      border-color: #bfd3ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.98);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.18s ease;
      font-weight: 700;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #c9d8ff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.07);
    }

    button.primary {
      background: linear-gradient(180deg, #3478ff 0%, #2563eb 100%);
      color: white;
      border-color: #2563eb;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    button.soft {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }

    .section-title {
      margin: 20px 0 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .adjust-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .adjust-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .adjust-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .adjust-label {
      font-size: 15px;
      font-weight: 800;
    }

    .adjust-unit {
      font-size: 12px;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 5px 8px;
      border-radius: 999px;
    }

    .adjust-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .adjust-row button {
      width: 100%;
      padding: 13px 10px;
      border-radius: 16px;
    }

    .preset-wrap {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .preset-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .preset-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 14px;
      line-height: 1;
      background: rgba(255, 255, 255, 0.98);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .result-card {
      background: var(--card-strong);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .result-card::after {
      content: "";
      position: absolute;
      top: -20px;
      right: -20px;
      width: 90px;
      height: 90px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.10), transparent 68%);
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .city {
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .time {
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .offset-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
    }

    .offset-label {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .offset-value {
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: -0.03em;
    }

    .warning {
      display: none;
      border-radius: 20px;
      padding: 14px 16px;
      border: 1px solid var(--warn-line);
      background: var(--warn-bg);
      color: var(--warn-text);
      line-height: 1.8;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 18px 12px 28px;
      }

      .card,
      .title-box {
        padding: 16px;
      }

      .picker-grid,
      .form-grid,
      .adjust-grid,
      .preset-wrap {
        grid-template-columns: 1fr;
      }

      .offset-box {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar button,
      .chip {
        width: 100%;
      }

      .adjust-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-box">
        <h1>⏳時區轉換器⌛</h1>
      </div>
    </div>

    <div class="layout">
      <section class="card">
        <h2>設定</h2>

        <div class="picker-grid">
          <div class="picker-card">
            <div class="picker-title">原始地點</div>
            <div class="form-grid">
              <div class="field">
                <label for="sourceCountry">國家</label>
                <select id="sourceCountry"></select>
              </div>
              <div class="field">
                <label for="sourceCitySelect">城市</label>
                <select id="sourceCitySelect"></select>
              </div>
            </div>
          </div>

          <div class="picker-card">
            <div class="picker-title">目標地點</div>
            <div class="form-grid">
              <div class="field">
                <label for="targetCountry">國家</label>
                <select id="targetCountry"></select>
              </div>
              <div class="field">
                <label for="targetCitySelect">城市</label>
                <select id="targetCitySelect"></select>
              </div>
            </div>
          </div>
        </div>

        <div class="field full">
          <label for="sourceDateTime">日期與時間</label>
          <input id="sourceDateTime" type="datetime-local" />
        </div>

        <div class="toolbar">
          <button id="nowBtn" class="primary" type="button">現在時間</button>
          <button id="swapBtn" class="soft" type="button">交換地點</button>
        </div>

        <div class="section-title">調整時間</div>
        <div class="adjust-grid">
          <div class="adjust-card">
            <div class="adjust-head">
              <div class="adjust-label">日</div>
              <div class="adjust-unit">1 日</div>
            </div>
            <div class="adjust-row">
              <button type="button" data-days="-1">-1</button>
              <button type="button" data-days="1">+1</button>
            </div>
          </div>

          <div class="adjust-card">
            <div class="adjust-head">
              <div class="adjust-label">時</div>
              <div class="adjust-unit">1 小時</div>
            </div>
            <div class="adjust-row">
              <button type="button" data-hours="-1">-1</button>
              <button type="button" data-hours="1">+1</button>
            </div>
          </div>

          <div class="adjust-card">
            <div class="adjust-head">
              <div class="adjust-label">分</div>
              <div class="adjust-unit">1 分</div>
            </div>
            <div class="adjust-row">
              <button type="button" data-minutes="-1">-1</button>
              <button type="button" data-minutes="1">+1</button>
            </div>
          </div>
        </div>

        <div class="section-title">常用地點</div>
        <div class="preset-wrap">
          <div class="preset-card">
            <div class="preset-title">設為原始</div>
            <div id="sourcePresetRow" class="preset-row"></div>
          </div>

          <div class="preset-card">
            <div class="preset-title">設為目標</div>
            <div id="targetPresetRow" class="preset-row"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>結果</h2>

        <div class="results">
          <div class="result-card">
            <div class="pill">原始</div>
            <div id="sourceCity" class="city"></div>
            <div id="sourceTime" class="time"></div>
            <div id="sourceDate" class="date"></div>
          </div>

          <div class="result-card">
            <div class="pill">目標</div>
            <div id="targetCity" class="city"></div>
            <div id="targetTime" class="time"></div>
            <div id="targetDate" class="date"></div>
          </div>

          <div class="offset-box">
            <div class="offset-label">依照你選定的日期與時間，自動處理冬令時間和夏令時間。</div>
            <div id="offsetValue" class="offset-value">+0h</div>
          </div>

          <div id="warningBox" class="warning"></div>
        </div>
      </section>
    </div>
  </div>

      {

          { country: "盧安達", cities: [{ city: "基加利", zone: "Africa/Kigali" }] },
          { country: "安哥拉", cities: [{ city: "羅安達", zone: "Africa/Luanda" }] },
          { country: "納米比亞", cities: [{ city: "溫得和克", zone: "Africa/Windhoek" }] },
          { country: "辛巴威", cities: [{ city: "哈拉雷", zone: "Africa/Harare" }] },
          { country: "波札那", cities: [{ city: "嘉柏隆里", zone: "Africa/Gaborone" }] },
          { country: "喀麥隆", cities: [{ city: "杜阿拉", zone: "Africa/Douala" }] },
          { country: "象牙海岸", cities: [{ city: "阿比讓", zone: "Africa/Abidjan" }] },
          { country: "塞內加爾", cities: [{ city: "達卡", zone: "Africa/Dakar" }] },
          { country: "剛果民主共和國", cities: [{ city: "金夏沙", zone: "Africa/Kinshasa" }] }
        ]
      },
      {
        label: "其他 Others",
        countries: [
          { country: "世界協調時間", cities: [{ city: "UTC", zone: "UTC" }] }
        ]
      }
    ];

    const presetLocations = [
      { country: "臺灣", city: "臺北" },
      { country: "愛爾蘭", city: "都柏林" },
      { country: "英國", city: "倫敦" },
      { country: "法國", city: "巴黎" },
      { country: "日本", city: "東京" },
      { country: "韓國", city: "首爾" },
      { country: "美國", city: "紐約" },
      { country: "美國", city: "洛杉磯" },
      { country: "澳洲", city: "雪梨" },
      { country: "冰島", city: "雷克雅維克" },
      { country: "阿聯酋", city: "杜拜" },
      { country: "紐西蘭", city: "奧克蘭" }
    ];

    const allCountries = locationGroups.flatMap(group =>
      group.countries.map(country => ({
        groupLabel: group.label,
        country: country.country,
        cities: country.cities
      }))
    );

    const sourceCountryEl = document.getElementById("sourceCountry");
    const sourceCitySelectEl = document.getElementById("sourceCitySelect");
    const targetCountryEl = document.getElementById("targetCountry");
    const targetCitySelectEl = document.getElementById("targetCitySelect");
    const sourceDateTimeEl = document.getElementById("sourceDateTime");
    const nowBtn = document.getElementById("nowBtn");
    const swapBtn = document.getElementById("swapBtn");
    const sourcePresetRow = document.getElementById("sourcePresetRow");
    const targetPresetRow = document.getElementById("targetPresetRow");
    const sourceCity = document.getElementById("sourceCity");
    const sourceTime = document.getElementById("sourceTime");
    const sourceDate = document.getElementById("sourceDate");
    const targetCity = document.getElementById("targetCity");
    const targetTime = document.getElementById("targetTime");
    const targetDate = document.getElementById("targetDate");
    const offsetValue = document.getElementById("offsetValue");
    const warningBox = document.getElementById("warningBox");

    function getCountryData(countryName) {
      return allCountries.find(item => item.country === countryName);
    }

    function getSelectedLocation(side) {
      const countryEl = side === "source" ? sourceCountryEl : targetCountryEl;
      const cityEl = side === "source" ? sourceCitySelectEl : targetCitySelectEl;
      const countryData = getCountryData(countryEl.value);
      if (!countryData) return null;
      const cityData = countryData.cities.find(item => item.city === cityEl.value) || countryData.cities[0];
      return {
        country: countryData.country,
        city: cityData.city,
        zone: cityData.zone
      };
    }

    function setLocation(side, countryName, cityName) {
      const countryEl = side === "source" ? sourceCountryEl : targetCountryEl;
      const cityEl = side === "source" ? sourceCitySelectEl : targetCitySelectEl;
      countryEl.value = countryName;
      populateCitySelect(side, cityName);
      cityEl.value = cityName;
    }

    function populateCountrySelects() {
      [sourceCountryEl, targetCountryEl].forEach(select => {
        select.innerHTML = "";
        locationGroups.forEach(group => {
          const optgroup = document.createElement("optgroup");
          optgroup.label = group.label;
          group.countries.forEach(country => {
            const option = document.createElement("option");
            option.value = country.country;
            option.textContent = country.country;
            optgroup.appendChild(option);
          });
          select.appendChild(optgroup);
        });
      });
    }

    function populateCitySelect(side, preferredCity) {
      const countryEl = side === "source" ? sourceCountryEl : targetCountryEl;
      const cityEl = side === "source" ? sourceCitySelectEl : targetCitySelectEl;
      const countryData = getCountryData(countryEl.value);
      cityEl.innerHTML = "";
      if (!countryData) return;

      countryData.cities.forEach(item => {
        const option = document.createElement("option");
        option.value = item.city;
        option.textContent = item.city;
        cityEl.appendChild(option);
      });

      const hasPreferred = countryData.cities.some(item => item.city === preferredCity);
      cityEl.value = hasPreferred ? preferredCity : countryData.cities[0].city;
    }

    function createPresetButtons() {
      presetLocations.forEach(item => {
        const label = `${item.country} ${item.city}`;

        const sourceBtn = document.createElement("button");
        sourceBtn.type = "button";
        sourceBtn.className = "chip";
        sourceBtn.textContent = label;
        sourceBtn.addEventListener("click", () => {
          setLocation("source", item.country, item.city);
          render(true);
        });
        sourcePresetRow.appendChild(sourceBtn);

        const targetBtn = document.createElement("button");
        targetBtn.type = "button";
        targetBtn.className = "chip";
        targetBtn.textContent = label;
        targetBtn.addEventListener("click", () => {
          setLocation("target", item.country, item.city);
          render(false);
        });
        targetPresetRow.appendChild(targetBtn);
      });
    }

    function toInputValue(dt) {
      return dt.toFormat("yyyy-LL-dd'T'HH:mm");
    }

    function formatOffset(minutes) {
      const sign = minutes >= 0 ? "+" : "-";
      const abs = Math.abs(minutes);
      const h = String(Math.floor(abs / 60)).padStart(2, "0");
      const m = String(abs % 60).padStart(2, "0");
      return `UTC${sign}${h}:${m}`;
    }

    function formatDate(dt) {
      return dt.setLocale("zh-TW").toFormat("yyyy/LL/dd ccc");
    }

    function formatTime(dt) {
      return dt.toFormat("HH:mm");
    }

    function getSourceDateTime() {
      const sourceLocation = getSelectedLocation("source");
      if (!sourceLocation || !sourceDateTimeEl.value) return null;
      return DateTime.fromISO(sourceDateTimeEl.value, { zone: sourceLocation.zone });
    }

    function setNow() {
      const sourceLocation = getSelectedLocation("source");
      const zone = sourceLocation ? sourceLocation.zone : "Asia/Taipei";
      const now = DateTime.now().setZone(zone).startOf("minute");
      sourceDateTimeEl.value = toInputValue(now);
      render(false);
    }

    function adjustTime({ days = 0, hours = 0, minutes = 0 }) {
      let dt = getSourceDateTime();
      const sourceLocation = getSelectedLocation("source");
      const zone = sourceLocation ? sourceLocation.zone : "Asia/Taipei";

      if (!dt || !dt.isValid) {
        dt = DateTime.now().setZone(zone).startOf("minute");
      }

      dt = dt.plus({ days, hours, minutes });
      sourceDateTimeEl.value = toInputValue(dt);
      render(false);
    }

    function updateWarning(sourceDT, rawInput) {
      const messages = [];

      if (!sourceDT || !sourceDT.isValid) {
        messages.push("請輸入有效的日期與時間。");
      }

      if (sourceDT && sourceDT.isValid) {
        const roundTrip = sourceDT.toFormat("yyyy-LL-dd'T'HH:mm");
        if (rawInput && roundTrip !== rawInput) {
          messages.push(`你輸入的時間剛好遇到夏令時間切換，系統已自動校正為 ${roundTrip}。`);
        }

        const possible = sourceDT.getPossibleOffsets ? sourceDT.getPossibleOffsets() : [];
        if (possible.length > 1) {
          messages.push("這個時間剛好落在冬夏令切換區段，因此可能出現重複時間。");
        }
      }

      if (messages.length) {
        warningBox.style.display = "block";
        warningBox.innerHTML = messages.join("<br><br>");
      } else {
        warningBox.style.display = "none";
        warningBox.innerHTML = "";
      }
    }

    function render(keepClockTime = false) {
      const sourceLocation = getSelectedLocation("source");
      const targetLocation = getSelectedLocation("target");
      const rawInput = sourceDateTimeEl.value;
      let sourceDT = getSourceDateTime();

      if ((!sourceDT || !sourceDT.isValid) && !rawInput && sourceLocation) {
        sourceDT = DateTime.now().setZone(sourceLocation.zone).startOf("minute");
        sourceDateTimeEl.value = toInputValue(sourceDT);
      }

      if (!sourceDT || !sourceDT.isValid || !sourceLocation || !targetLocation) {
        sourceCity.textContent = sourceLocation ? `${sourceLocation.country} ${sourceLocation.city}` : "";
        sourceTime.textContent = "--:--";
        sourceDate.textContent = "";
        targetCity.textContent = targetLocation ? `${targetLocation.country} ${targetLocation.city}` : "";
        targetTime.textContent = "--:--";
        targetDate.textContent = "";
        offsetValue.textContent = "--";
        updateWarning(sourceDT, rawInput);
        return;
      }

      if (keepClockTime) {
        sourceDT = DateTime.fromObject(
          {
            year: sourceDT.year,
            month: sourceDT.month,
            day: sourceDT.day,
            hour: sourceDT.hour,
            minute: sourceDT.minute
          },
          { zone: sourceLocation.zone }
        );
        sourceDateTimeEl.value = toInputValue(sourceDT);
      }

      const targetDT = sourceDT.setZone(targetLocation.zone);
      const diffMinutes = targetDT.offset - sourceDT.offset;
      const diffHours = diffMinutes / 60;
      const diffText = Number.isInteger(diffHours)
        ? `${diffHours >= 0 ? "+" : ""}${diffHours}h`
        : `${diffHours >= 0 ? "+" : ""}${diffHours.toFixed(1)}h`;

      sourceCity.textContent = `${sourceLocation.country} ${sourceLocation.city} ・ ${formatOffset(sourceDT.offset)}`;
      sourceTime.textContent = formatTime(sourceDT);
      sourceDate.textContent = formatDate(sourceDT);

      targetCity.textContent = `${targetLocation.country} ${targetLocation.city} ・ ${formatOffset(targetDT.offset)}`;
      targetTime.textContent = formatTime(targetDT);
      targetDate.textContent = formatDate(targetDT);

      offsetValue.textContent = diffText;
      updateWarning(sourceDT, rawInput);
    }

    function swapLocations() {
      const currentSource = getSourceDateTime();
      const sourceLocation = getSelectedLocation("source");
      const targetLocation = getSelectedLocation("target");

      if (!sourceLocation || !targetLocation) return;

      const newSourceMoment = currentSource && currentSource.isValid
        ? currentSource.setZone(targetLocation.zone)
        : null;

      setLocation("source", targetLocation.country, targetLocation.city);
      setLocation("target", sourceLocation.country, sourceLocation.city);

      if (newSourceMoment && newSourceMoment.isValid) {
        sourceDateTimeEl.value = toInputValue(newSourceMoment);
      }

      render(false);
    }

    document.querySelectorAll("[data-days], [data-hours], [data-minutes]").forEach(btn => {
      btn.addEventListener("click", () => {
        adjustTime({
          days: Number(btn.dataset.days || 0),
          hours: Number(btn.dataset.hours || 0),
          minutes: Number(btn.dataset.minutes || 0)
        });
      });
    });

    sourceCountryEl.addEventListener("change", () => {
      populateCitySelect("source");
      render(true);
    });

    sourceCitySelectEl.addEventListener("change", () => render(true));

    targetCountryEl.addEventListener("change", () => {
      populateCitySelect("target");
      render(false);
    });

    targetCitySelectEl.addEventListener("change", () => render(false));
    sourceDateTimeEl.addEventListener("input", () => render(false));
    nowBtn.addEventListener("click", setNow);
    swapBtn.addEventListener("click", swapLocations);

    populateCountrySelects();
    setLocation("source", "臺灣", "臺北");
    setLocation("target", "愛爾蘭", "都柏林");
    createPresetButtons();
    setNow();
  </script>
